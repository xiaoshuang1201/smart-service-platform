apiVersion: v1
kind: ConfigMap
metadata:
  name: smartservice-config
  namespace: smartservice
data:
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  LLM_MODEL: "qwen-max"
  LLM_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  VECTOR_BACKEND: "qdrant"
  QDRANT_URL: "http://qdrant.smartservice.svc.cluster.local:6333"
  QDRANT_GRPC_PORT: "6334"
  REDIS_URL: "redis://redis.smartservice.svc.cluster.local:6379/0"
  REDIS_BACKEND: "single"
  CELERY_BROKER_URL: "redis://redis.smartservice.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis.smartservice.svc.cluster.local:6379/2"
  DATABASE_URL: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres.smartservice.svc.cluster.local:5432/smartservice"
  DATABASE_URL_SYNC: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres.smartservice.svc.cluster.local:5432/smartservice"
  MINIO_ENDPOINT: "minio.smartservice.svc.cluster.local:9000"
  MINIO_BUCKET: "knowledge-docs"
  MINIO_SECURE: "false"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.smartservice.svc.cluster.local:4317"
  OMS_VENDOR: "mock"
  CRM_VENDOR: "mock"
  CORS_ORIGINS: "*"
