apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: smartservice
resources:
  - namespace.yaml
  - secrets.yaml
  - configmap.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - deployment-ui.yaml
  - service-api.yaml
  - service-ui.yaml
  - ingress.yaml
  - hpa-api.yaml
  - hpa-worker.yaml
  - network-policy.yaml
  - pdb.yaml
  - service-monitor.yaml
commonLabels:
  app.kubernetes.io/part-of: smartservice-platform
images:
  - name: ghcr.io/xiaoshuang1201/smartservice-api
    newTag: latest
  - name: ghcr.io/xiaoshuang1201/smartservice-ui
    newTag: latest
