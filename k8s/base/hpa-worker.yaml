apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartservice-worker-hpa
  namespace: smartservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartservice-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
