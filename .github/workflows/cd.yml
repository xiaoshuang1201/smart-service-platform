name: CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "k8s/**"
      - "Dockerfile"
      - "Dockerfile.ui"
      - "requirements*.txt"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}-api
  IMAGE_NAME_UI: ${{ github.repository }}-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: type=sha,prefix=,format=short,type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:${{ steps.meta.outputs.version }}

  deploy-staging:
    needs: [build-and-push]
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      - run: |
          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/smartservice-api -n smartservice --timeout=300s
      - name: Smoke tests
        run: |
          sleep 10
          curl -sf http://api.staging.smartservice.example.com/api/v1/admin/health

  deploy-production:
    needs: [deploy-staging]
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
      - run: |
          kubectl apply -k k8s/overlays/production/
          kubectl rollout status deployment/smartservice-api -n smartservice --timeout=300s
